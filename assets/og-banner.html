<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background-color: #0f1117;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Background glow */
  .glow-tl {
    position: absolute;
    top: -80px;
    left: -80px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(37,99,235,0.22) 0%, transparent 65%);
    border-radius: 50%;
    filter: blur(60px);
  }

  .glow-br {
    position: absolute;
    bottom: -100px;
    right: -60px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 65%);
    border-radius: 50%;
    filter: blur(60px);
  }

  /* Dot grid decoration */
  .dots {
    position: absolute;
    top: 28px;
    right: 48px;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 7px;
    opacity: 0.18;
  }
  .dot {
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
  }
  .dots-bl {
    position: absolute;
    bottom: 28px;
    left: 48px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 7px;
    opacity: 0.12;
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    max-width: 780px;
    padding: 0 60px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.25);
    color: #86efac;
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 22px;
    letter-spacing: 0.01em;
  }

  .pulse {
    width: 7px;
    height: 7px;
    background: #22c55e;
    border-radius: 50%;
    flex-shrink: 0;
  }

  h1 {
    font-size: 68px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    background: linear-gradient(135deg, #fff 0%, #93c5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 14px;
  }

  .role {
    font-size: 22px;
    color: #9ca3af;
    font-weight: 500;
    margin-bottom: 28px;
    letter-spacing: -0.01em;
  }

  .divider {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, #2563eb, #93c5fd);
    border-radius: 4px;
    margin-bottom: 28px;
  }

  .pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }

  .pill {
    font-size: 13px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    color: #9ca3af;
    padding: 5px 14px;
    border-radius: 999px;
    font-weight: 500;
  }

  .url {
    font-size: 15px;
    color: #60a5fa;
    font-weight: 500;
    letter-spacing: 0.01em;
    opacity: 0.85;
  }

  /* Right side decoration */
  .right-deco {
    position: absolute;
    right: 72px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: flex-end;
    opacity: 0.6;
  }

  .deco-line {
    height: 2px;
    background: linear-gradient(90deg, transparent, #2563eb);
    border-radius: 2px;
  }
</style>
</head>
<body>

  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <!-- Dot grid top-right -->
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <!-- Dot grid bottom-left -->
  <div class="dots-bl">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <!-- Right decoration lines -->
  <div class="right-deco">
    <div class="deco-line" style="width:90px"></div>
    <div class="deco-line" style="width:60px"></div>
    <div class="deco-line" style="width:120px"></div>
    <div class="deco-line" style="width:45px"></div>
    <div class="deco-line" style="width:75px"></div>
  </div>

  <div class="card">
    <div class="badge">
      <span class="pulse"></span>
      Open to new opportunities
    </div>

    <h1>Benjamín Espina</h1>

    <p class="role">Software Engineer &amp; Business Analyst</p>

    <div class="divider"></div>

    <div class="pills">
      <span class="pill">Angular</span>
      <span class="pill">React</span>
      <span class="pill">Node.js</span>
      <span class="pill">Python</span>
      <span class="pill">SQL Server</span>
      <span class="pill">Azure DevOps</span>
    </div>

    <span class="url">espinabenjamin.vercel.app</span>
  </div>

</body>
</html>
